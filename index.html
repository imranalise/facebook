<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facebook Clone | Imran Ali SE</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="mob-style.css"/>
  </head>
  <body>
    <!-- Main Facebook Page -->
    <div id="main-pages">
      <!-- Sub- Main - Facebook Page -->

      <div class="sub-main-page">
        <div class="first-half">
          <div class="logo-image">
            <img src="logo.webp" alt="" />
          </div>

          <div class="banner-image">
            <img src=".banner.webp" alt="" />
          </div>
          <div class="text-view">Explore the thing <span>you love</span></div>
        </div>
        <div class="sec-half">
          <div class="full-form">
            <div class="first-par">Login into Facebook</div>
            <form action="">
              <input
                type="text"
                id="text"
                placeholder="Email or Phone Number"
              />
              <br>
              <input type="password" id="password" placeholder="Password" />
              <br>
              <button>Login </button>
              <div class="forget-pass"><a href="">Forget Password</a></div>
            </form>
            <div class="with-form">
            <div class="new-acc">
             <button>Create New Account</button>
            </div>
            <div class="under-logo"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
